<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Menú - Burger Joint</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/menuES.css">
    <link rel="stylesheet" href="css/footer.css">
</head>
<body>

    <div class="body-overlay"></div>

    <header class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img src="assets/logo-1.png" alt="Burger Joint Logo">
            </a>
            
            <button class="mobile-menu-btn" id="mobile-menu-btn">
                <i class="fas fa-bars"></i>
            </button>

            <div class="menu-overlay" id="menu-overlay"></div>

            <nav class="nav-links" id="nav-links">
                <button class="close-menu-btn" id="close-menu-btn">
                    <i class="fas fa-times"></i>
                </button>
                <a href="index.html#hero">Home</a>
                <a href="index.html#historia">Nosotros</a>
                <a href="menuES.html" class="active">Menú</a>
                <a href="https://www.instagram.com/burgerjointpalermo/" target="_blank" class="social-icon">
                    <i class="fab fa-instagram"></i>
                </a>
            </nav>
        </div>
    </header>

    <main class="catalog-wrapper">
        <div class="intro-text reveal">
            <h1>Nuestras <span class="text-accent">Burgers</span></h1>
            <p>Elegí tu favorita para ver los detalles</p>
        </div>

        <div class="burger-gallery" id="burger-gallery">
            <a href="detalleBurger.html?id=clasica" class="burger-item reveal">
                <img src="assets/clasica.png" alt="La Clásica" loading="lazy">
            </a>

            <a href="detalleBurger.html?id=mexican" class="burger-item reveal">
                <img src="assets/mexican.png" alt="Mexican" loading="lazy">
            </a>

            <a href="detalleBurger.html?id=machete" class="burger-item reveal">
                <img src="assets/machete.png" alt="Machete" loading="lazy">
            </a>

            <a href="detalleBurger.html?id=american" class="burger-item reveal">
                <img src="assets/american.png" alt="American" loading="lazy">
            </a>

            <a href="detalleBurger.html?id=double" class="burger-item reveal">
                <img src="assets/double-cheese.png" alt="Double Cheese" loading="lazy">
            </a>

            <a href="detalleBurger.html?id=bleu" class="burger-item reveal">
                <img src="assets/bleu-1.png" alt="La Bleu" loading="lazy">
            </a>

            <a href="detalleBurger.html?id=jamaican" class="burger-item reveal">
                <img src="assets/jamaican.png" alt="Jamaican" loading="lazy">
            </a>

            <a href="detalleBurger.html?id=420" class="burger-item reveal">
                <img src="assets/420-2.png" alt="4:20 Burger" loading="lazy">
            </a>

            <a href="detalleBurger.html?id=veggie" class="burger-item reveal">
                <img src="assets/veggie.png" alt="Veggie" loading="lazy">
            </a>

            <a href="detalleBurger.html?id=ginobili" class="burger-item reveal">
                <img src="assets/ginobili.png" alt="Ginobili" loading="lazy">
            </a>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/navbar.js"></script>
    <script src="js/menuES.js"></script>
    <script src="js/footer.js"></script>
</body>
</html>
