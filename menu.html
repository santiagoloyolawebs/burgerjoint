<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Idioma - Burger Joint</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/footer.css">
</head>
<body>

    <header class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img src="assets/logo-1.png" alt="Burger Joint Logo">
            </a>
            
            <button class="mobile-menu-btn" id="mobile-menu-btn"><i class="fas fa-bars"></i></button>
            <div class="menu-overlay" id="menu-overlay"></div>

            <nav class="nav-links" id="nav-links">
                <button class="close-menu-btn" id="close-menu-btn"><i class="fas fa-times"></i></button>
                <a href="index.html#hero">Home</a>
                <a href="index.html#historia">Nosotros</a>
                <a href="menu.html" class="active">Menú</a>
                <a href="index.html#contacto">Contacto</a>
                <a href="https://www.instagram.com/burgerjointpalermo/" target="_blank" class="social-icon"><i class="fab fa-instagram"></i></a>
                <a href="pedidos.html" class="btn-nav-order">Hacer Pedido</a>
            </nav>
        </div>
    </header>

    <main class="menu-landing">
        <div class="menu-landing-overlay"></div>
        
        <div class="menu-glass-card reveal">
            <div class="menu-headers">
                <h1 class="menu-title">Selecciona<br>tu idioma</h1>
                <p class="menu-subtitle">Choose your language</p>
            </div>
            
            <div class="language-options">
                <a href="menuES.html" class="lang-card">
                    <img src="assets/spanish.png" alt="Ver Menú en Español">
                </a>
                <a href="#" class="lang-card">
                    <img src="assets/english.png" alt="See Menu in English">
                </a>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/navbar.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/footer.js"></script>
</body>
</html>
